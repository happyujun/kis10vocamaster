<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIS Grade 10 - Unit 2 Vocab Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+KR:wght@400;700&display=swap');
        body { font-family: 'Inter', 'Noto Sans KR', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900">

    <div id="app" class="max-w-4xl mx-auto px-4 py-8">
        <!-- Header -->
        <header class="text-center mb-10">
            <div class="inline-block p-3 bg-indigo-600 text-white rounded-2xl mb-4 shadow-lg shadow-indigo-200">
                <i data-lucide="graduation-cap" class="w-8 h-8"></i>
            </div>
            <h1 class="text-3xl font-bold text-slate-800">KIS Vocab Master</h1>
            <p class="text-indigo-600 font-semibold mt-1">UNIT 2. The Relationship between Dinosaurs and Birds</p>
        </header>

        <!-- Selection Section -->
        <div id="selection-section" class="space-y-6">
            <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold flex items-center gap-2">
                        <i data-lucide="list-checks" class="text-indigo-500"></i>
                        학습 단어 선택 (<span id="selected-count">0</span>)
                    </h2>
                    <div class="flex gap-4 text-sm font-medium">
                        <button onclick="selectAll(true)" class="text-indigo-600 hover:text-indigo-800 transition-colors">전체 선택</button>
                        <button onclick="selectAll(false)" class="text-slate-400 hover:text-slate-600 transition-colors">전체 해제</button>
                    </div>
                </div>
                
                <div id="word-list" class="grid grid-cols-1 md:grid-cols-2 gap-3 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                    <!-- Words injected here -->
                </div>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <button onclick="startSession('en-kr')" class="group p-6 bg-white border-2 border-slate-100 rounded-3xl hover:border-indigo-500 hover:bg-indigo-50 transition-all text-left shadow-sm">
                    <div class="flex items-center gap-4">
                        <div class="p-3 bg-indigo-100 text-indigo-600 rounded-2xl group-hover:bg-indigo-600 group-hover:text-white transition-colors">
                            <i data-lucide="languages"></i>
                        </div>
                        <div>
                            <p class="font-bold text-lg">English → Korean</p>
                            <p class="text-sm text-slate-500">영단어를 보고 뜻을 입력하세요</p>
                        </div>
                    </div>
                </button>
                <button onclick="startSession('kr-en')" class="group p-6 bg-white border-2 border-slate-100 rounded-3xl hover:border-emerald-500 hover:bg-emerald-50 transition-all text-left shadow-sm">
                    <div class="flex items-center gap-4">
                        <div class="p-3 bg-emerald-100 text-emerald-600 rounded-2xl group-hover:bg-emerald-600 group-hover:text-white transition-colors">
                            <i data-lucide="keyboard"></i>
                        </div>
                        <div>
                            <p class="font-bold text-lg">Korean → English</p>
                            <p class="text-sm text-slate-500">뜻을 보고 영단어를 입력하세요</p>
                        </div>
                    </div>
                </button>
            </div>
        </div>

        <!-- Quiz Section -->
        <div id="quiz-section" class="hidden max-w-lg mx-auto py-10">
            <div class="mb-6 flex justify-between items-center px-2">
                <span id="quiz-progress" class="text-sm font-bold text-slate-400 tracking-wider">PROBLEM 1 OF 10</span>
                <div class="flex items-center gap-2">
                    <span id="quiz-score" class="text-sm font-bold text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full">Score: 0</span>
                </div>
            </div>
            
            <div class="bg-white p-12 rounded-[40px] shadow-2xl border border-white text-center space-y-10 relative overflow-hidden">
                <div id="progress-bar" class="absolute top-0 left-0 h-1.5 bg-indigo-500 transition-all duration-500" style="width: 0%"></div>
                
                <div class="space-y-3">
                    <h2 id="target-word" class="text-5xl font-black text-slate-800 break-words leading-tight">Word</h2>
                    <p id="target-hint" class="text-slate-400 font-medium tracking-tight">뜻을 입력하세요</p>
                </div>

                <div class="space-y-4">
                    <input type="text" id="answer-input" placeholder="정답을 입력하세요..." autocomplete="off" class="w-full px-6 py-5 bg-slate-50 rounded-3xl border-2 border-transparent focus:border-indigo-500 focus:bg-white focus:outline-none text-2xl text-center font-bold transition-all">
                    <button id="submit-btn" class="w-full py-5 bg-slate-900 text-white rounded-3xl font-bold text-lg hover:bg-indigo-600 transition-all shadow-xl active:scale-95">
                        확인 (Enter)
                    </button>
                </div>
            </div>
            
            <div id="feedback" class="mt-8 text-center h-10 flex items-center justify-center font-bold text-xl"></div>
        </div>

        <!-- Result Section -->
        <div id="result-section" class="hidden text-center max-w-lg mx-auto py-10">
            <div class="bg-white p-10 rounded-[40px] shadow-2xl border border-white">
                <div id="result-icon" class="mb-6">
                    <i data-lucide="trophy" class="w-20 h-20 text-yellow-500 mx-auto"></i>
                </div>
                <h2 class="text-3xl font-bold text-slate-800 mb-2">학습이 끝났습니다!</h2>
                <p id="final-stats" class="text-xl text-slate-500 mb-10">10문제 중 8문제를 맞혔습니다.</p>
                
                <div id="incorrect-list-container" class="hidden mb-10 text-left">
                    <h3 class="text-sm font-black text-slate-400 mb-4 tracking-widest uppercase flex items-center gap-2">
                        <i data-lucide="alert-circle" class="w-4 h-4"></i> 복습이 필요한 단어
                    </h3>
                    <div id="incorrect-list" class="grid grid-cols-1 gap-2 max-h-48 overflow-y-auto pr-2 custom-scrollbar">
                        <!-- Incorrect items -->
                    </div>
                </div>

                <div class="flex flex-col gap-3">
                    <button id="retry-incorrect-btn" class="w-full py-5 bg-orange-500 text-white rounded-3xl font-bold text-lg hover:bg-orange-600 transition-colors shadow-lg shadow-orange-100 hidden">
                        틀린 단어만 다시 풀기
                    </button>
                    <button onclick="location.reload()" class="w-full py-5 bg-slate-100 text-slate-700 rounded-3xl font-bold text-lg hover:bg-slate-200 transition-colors">
                        처음으로 돌아가기
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 px-8 py-4 rounded-3xl bg-slate-900 text-white text-sm font-bold opacity-0 transition-all duration-300 pointer-events-none z-50 shadow-2xl">
        Message
    </div>

    <script>
        // PDF 데이터 추출 결과 고정
        const dinosaurVocab = [
            { "word": "fossilized", "meaning": "화석화된" },
            { "word": "paleontologist", "meaning": "고생물학자" },
            { "word": "reptile", "meaning": "파충류" },
            { "word": "theory", "meaning": "이론, 학설" },
            { "word": "connection", "meaning": "관련성, 연결" },
            { "word": "basis", "meaning": "근거, 기초" },
            { "word": "structure", "meaning": "구조" },
            { "word": "evolve", "meaning": "진화하다" },
            { "word": "declare", "meaning": "선언하다" },
            { "word": "similarity", "meaning": "유사점" },
            { "word": "meat-eating", "meaning": "육식의" },
            { "word": "instance", "meaning": "예시, 사례" },
            { "word": "feather", "meaning": "깃털" },
            { "word": "species", "meaning": "종, 종(생물 분류)" },
            { "word": "classify", "meaning": "분류하다" },
            { "word": "beak", "meaning": "(새의) 부리,부리" },
            { "word": "claw", "meaning": "발톱" },
            { "word": "unearthed", "meaning": "발굴된" },
            { "word": "assume", "meaning": "추정하다" },
            { "word": "identify", "meaning": "확인하다" },
            { "word": "fall out of favor", "meaning": "지지를 잃다" },
            { "word": "debate", "meaning": "논쟁, 토론" },
            { "word": "anew", "meaning": "다시, 새로이" },
            { "word": "publish", "meaning": "출판하다" },
            { "word": "comparison", "meaning": "비교" },
            { "word": "skeleton", "meaning": "골격, 해골" },
            { "word": "carnivorous", "meaning": "육식성의" },
            { "word": "fused", "meaning": "융합된" },
            { "word": "collarbone", "meaning": "쇄골" },
            { "word": "vital", "meaning": "매우 중요한" },
            { "word": "common ancestor", "meaning": "공통 조상" },
            { "word": "skeptic", "meaning": "회의론자" },
            { "word": "ability", "meaning": "능력" },
            { "word": "flight", "meaning": "비행" },
            { "word": "ground-based", "meaning": "지상에 근거를 둔" },
            { "word": "nevertheless", "meaning": "그럼에도 불구하고" },
            { "word": "popular", "meaning": "대중적인, 인기 있는" },
            { "word": "settle", "meaning": "해결하다, 결정하다" },
            { "word": "descendant", "meaning": "후손, 자손" },
            { "word": "decisive", "meaning": "결정적인, 확고한" }
        ];

        let sessionWords = [];
        let currentIndex = 0;
        let score = 0;
        let mode = 'en-kr';
        let incorrectWords = [];

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.opacity = '1';
            toast.style.bottom = '40px';
            setTimeout(() => { 
                toast.style.opacity = '0'; 
                toast.style.bottom = '30px';
            }, 2500);
        }

        function initWordList() {
            const list = document.getElementById('word-list');
            list.innerHTML = '';
            dinosaurVocab.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = "flex items-center gap-3 p-4 bg-slate-50 border border-slate-100 rounded-2xl hover:bg-white hover:shadow-md hover:border-indigo-200 transition-all cursor-pointer";
                div.onclick = (e) => {
                    if(e.target.tagName !== 'INPUT') {
                        const cb = div.querySelector('input');
                        cb.checked = !cb.checked;
                        updateSelectedCount();
                    }
                };
                div.innerHTML = `
                    <input type="checkbox" id="word-${index}" checked class="w-5 h-5 accent-indigo-600 rounded-lg cursor-pointer" onchange="updateSelectedCount()">
                    <label for="word-${index}" class="flex-1 cursor-pointer select-none">
                        <span class="font-bold text-slate-800">${item.word}</span>
                        <span class="mx-2 text-slate-300">|</span>
                        <span class="text-slate-500 text-sm font-medium">${item.meaning}</span>
                    </label>
                `;
                list.appendChild(div);
            });
            updateSelectedCount();
        }

        function updateSelectedCount() {
            const count = document.querySelectorAll('#word-list input:checked').length;
            document.getElementById('selected-count').textContent = count;
        }

        function selectAll(bool) {
            document.querySelectorAll('#word-list input').forEach(input => input.checked = bool);
            updateSelectedCount();
        }

        function startSession(selectedMode) {
            const selectedIndices = Array.from(document.querySelectorAll('#word-list input:checked'))
                                       .map(input => parseInt(input.id.split('-')[1]));
            
            if (selectedIndices.length === 0) {
                showToast("학습할 단어를 한 개 이상 선택해주세요!");
                return;
            }

            mode = selectedMode;
            sessionWords = selectedIndices.map(i => dinosaurVocab[i]).sort(() => Math.random() - 0.5);
            
            currentIndex = 0;
            score = 0;
            incorrectWords = [];

            document.getElementById('selection-section').classList.add('hidden');
            document.getElementById('quiz-section').classList.remove('hidden');
            
            renderQuiz();
        }

        function renderQuiz() {
            if (currentIndex >= sessionWords.length) {
                showResults();
                return;
            }

            const current = sessionWords[currentIndex];
            const targetEl = document.getElementById('target-word');
            const hintEl = document.getElementById('target-hint');
            const input = document.getElementById('answer-input');
            const feedback = document.getElementById('feedback');

            input.value = '';
            feedback.textContent = '';
            input.focus();

            if (mode === 'en-kr') {
                targetEl.textContent = current.word;
                hintEl.textContent = "뜻을 한글로 입력하세요";
            } else {
                targetEl.textContent = current.meaning;
                hintEl.textContent = "영단어(철자)를 입력하세요";
            }

            updateProgress();
        }

        function updateProgress() {
            const total = sessionWords.length;
            const current = currentIndex + 1;
            document.getElementById('quiz-progress').textContent = `PROBLEM ${current} OF ${total}`;
            document.getElementById('quiz-score').textContent = `Score: ${score}`;
            document.getElementById('progress-bar').style.width = `${(currentIndex / total) * 100}%`;
        }

        function checkAnswer() {
            const input = document.getElementById('answer-input');
            const feedback = document.getElementById('feedback');
            const userAnswer = input.value.trim().toLowerCase();
            const current = sessionWords[currentIndex];
            
            let isCorrect = false;
            let correctAnswerStr = "";

            if (mode === 'en-kr') {
                correctAnswerStr = current.meaning.toLowerCase();
                // 한글 뜻은 쉼표 등으로 여러 개일 수 있으므로 유연하게 체크
                const possibleMeanings = correctAnswerStr.split(',').map(m => m.trim());
                isCorrect = possibleMeanings.some(m => m === userAnswer || userAnswer.includes(m) || m.includes(userAnswer)) && userAnswer.length > 0;
            } else {
                correctAnswerStr = current.word.toLowerCase();
                isCorrect = userAnswer === correctAnswerStr;
            }

            if (isCorrect) {
                score++;
                feedback.textContent = "정답입니다! ✨";
                feedback.className = "mt-8 text-center h-10 flex items-center justify-center font-bold text-xl text-emerald-500 animate-bounce";
            } else {
                incorrectWords.push(current);
                feedback.innerHTML = `<span class="text-red-500">오답!</span> <span class="text-slate-400 ml-2">정답: ${correctAnswerStr}</span>`;
                feedback.className = "mt-8 text-center h-10 flex items-center justify-center font-bold text-xl";
            }

            document.getElementById('submit-btn').disabled = true;
            input.disabled = true;
            
            setTimeout(() => {
                currentIndex++;
                document.getElementById('submit-btn').disabled = false;
                input.disabled = false;
                renderQuiz();
            }, 1500);
        }

        function showResults() {
            document.getElementById('quiz-section').classList.add('hidden');
            document.getElementById('result-section').classList.remove('hidden');
            
            const stats = document.getElementById('final-stats');
            stats.textContent = `${sessionWords.length}문제 중 ${score}문제를 맞혔습니다.`;
            
            const incorrectContainer = document.getElementById('incorrect-list-container');
            const incorrectList = document.getElementById('incorrect-list');
            const retryBtn = document.getElementById('retry-incorrect-btn');

            if (incorrectWords.length > 0) {
                incorrectContainer.classList.remove('hidden');
                retryBtn.classList.remove('hidden');
                incorrectList.innerHTML = '';
                incorrectWords.forEach(item => {
                    const div = document.createElement('div');
                    div.className = "p-3 bg-slate-50 rounded-2xl flex justify-between border border-slate-100";
                    div.innerHTML = `<span class="font-bold text-slate-700">${item.word}</span> <span class="text-slate-400 font-medium">${item.meaning}</span>`;
                    incorrectList.appendChild(div);
                });

                retryBtn.onclick = () => {
                    sessionWords = [...incorrectWords].sort(() => Math.random() - 0.5);
                    currentIndex = 0;
                    score = 0;
                    incorrectWords = [];
                    document.getElementById('result-section').classList.add('hidden');
                    document.getElementById('quiz-section').classList.remove('hidden');
                    renderQuiz();
                };
            } else {
                incorrectContainer.classList.add('hidden');
                retryBtn.classList.add('hidden');
                document.getElementById('result-icon').innerHTML = `<i data-lucide="party-popper" class="w-20 h-20 text-emerald-500 mx-auto"></i>`;
                lucide.createIcons();
            }
        }

        document.getElementById('submit-btn').onclick = checkAnswer;
        document.getElementById('answer-input').onkeydown = (e) => {
            if (e.key === 'Enter' && !document.getElementById('submit-btn').disabled) {
                checkAnswer();
            }
        };

        // 초기화
        window.onload = () => {
            initWordList();
            lucide.createIcons();
        };

    </script>
</body>
</html>
