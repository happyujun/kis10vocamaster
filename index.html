<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIS 10th Grade Vocab Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+KR:wght@400;700&display=swap');
        body { font-family: 'Inter', 'Noto Sans KR', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .card-flip { perspective: 1000px; }
        .card-inner { transition: transform 0.6s; transform-style: preserve-3d; }
        .flipped { transform: rotateY(180deg); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900">

    <div id="app" class="max-w-4xl mx-auto px-4 py-8">
        <!-- Header -->
        <header class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-3xl font-bold text-indigo-700 flex items-center gap-2">
                    <i data-lucide="graduation-cap"></i> KIS Vocab Master
                </h1>
                <p class="text-slate-500">Grade 10 English Vocabulary Practice</p>
            </div>
            <div id="status-badge" class="hidden px-3 py-1 bg-green-100 text-green-700 rounded-full text-sm font-medium">
                Connected
            </div>
        </header>

        <!-- Main Logic Containers -->
        <div id="upload-section" class="space-y-6">
            <div class="border-2 border-dashed border-slate-300 rounded-2xl p-12 text-center bg-white hover:border-indigo-400 transition-colors cursor-pointer" id="drop-zone">
                <input type="file" id="pdf-input" class="hidden" accept=".pdf">
                <div class="flex flex-col items-center gap-4">
                    <div class="p-4 bg-indigo-50 text-indigo-600 rounded-full">
                        <i data-lucide="file-up" class="w-8 h-8"></i>
                    </div>
                    <div>
                        <p class="text-lg font-semibold">단어장 PDF 업로드</p>
                        <p class="text-slate-400 text-sm">파일을 드래그하거나 클릭하여 선택하세요</p>
                    </div>
                </div>
            </div>
            
            <div id="loading-spinner" class="hidden text-center py-8">
                <div class="animate-spin inline-block w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full mb-4"></div>
                <p class="text-slate-600">AI가 단어를 분석하고 있습니다...</p>
            </div>
        </div>

        <!-- Word Selection Section -->
        <div id="selection-section" class="hidden space-y-6">
            <div class="flex justify-between items-end">
                <h2 class="text-xl font-bold">학습할 단어 선택 (<span id="selected-count">0</span>)</h2>
                <div class="flex gap-2">
                    <button onclick="selectAll(true)" class="text-sm text-indigo-600 hover:underline">모두 선택</button>
                    <button onclick="selectAll(false)" class="text-sm text-slate-500 hover:underline">선택 해제</button>
                </div>
            </div>
            <div id="word-list" class="grid grid-cols-1 md:grid-cols-2 gap-3 max-h-96 overflow-y-auto p-4 bg-white border rounded-xl">
                <!-- Word items will be injected here -->
            </div>
            
            <div class="bg-white p-6 rounded-xl border space-y-4">
                <h3 class="font-bold">학습 모드 선택</h3>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="startSession('en-kr')" class="p-4 border-2 border-slate-200 rounded-xl hover:border-indigo-500 hover:bg-indigo-50 transition-all text-left group">
                        <p class="font-bold group-hover:text-indigo-700">English → Korean</p>
                        <p class="text-sm text-slate-500">영단어를 보고 뜻을 입력합니다</p>
                    </button>
                    <button onclick="startSession('kr-en')" class="p-4 border-2 border-slate-200 rounded-xl hover:border-indigo-500 hover:bg-indigo-50 transition-all text-left group">
                        <p class="font-bold group-hover:text-indigo-700">Korean → English</p>
                        <p class="text-sm text-slate-500">한글을 보고 영단어를 입력합니다</p>
                    </button>
                </div>
            </div>
        </div>

        <!-- Quiz Section -->
        <div id="quiz-section" class="hidden max-w-lg mx-auto">
            <div class="mb-8 flex justify-between items-center text-sm font-medium text-slate-500">
                <span id="quiz-progress">Question 1 of 10</span>
                <span id="quiz-score">Score: 0</span>
            </div>
            
            <div class="bg-white p-12 rounded-3xl shadow-xl border text-center space-y-8 relative overflow-hidden">
                <div id="progress-bar" class="absolute top-0 left-0 h-1 bg-indigo-500 transition-all duration-300" style="width: 0%"></div>
                
                <div class="space-y-2">
                    <h2 id="target-word" class="text-4xl font-bold text-slate-800">Word</h2>
                    <p id="target-hint" class="text-slate-400">뜻을 입력하세요</p>
                </div>

                <div class="space-y-4">
                    <input type="text" id="answer-input" placeholder="정답 입력..." class="w-full px-6 py-4 bg-slate-100 rounded-2xl border-2 border-transparent focus:border-indigo-500 focus:outline-none text-xl text-center">
                    <button id="submit-btn" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold hover:bg-indigo-700 transition-colors shadow-lg shadow-indigo-200">
                        확인 (Enter)
                    </button>
                </div>
            </div>
            
            <div id="feedback" class="mt-6 text-center h-8 font-bold"></div>
        </div>

        <!-- Result Section -->
        <div id="result-section" class="hidden text-center space-y-8">
            <div class="p-12 bg-white rounded-3xl shadow-xl border">
                <div class="mb-6">
                    <i data-lucide="trophy" class="w-16 h-16 text-yellow-500 mx-auto"></i>
                </div>
                <h2 class="text-3xl font-bold mb-2">학습 완료!</h2>
                <p id="final-stats" class="text-xl text-slate-600 mb-8 font-bold">10문제 중 8문제를 맞혔습니다.</p>
                
                <div id="incorrect-list-container" class="hidden mb-8">
                    <h3 class="text-lg font-bold text-red-500 mb-4">틀린 단어 목록</h3>
                    <div id="incorrect-list" class="grid grid-cols-2 gap-2 text-sm text-left max-h-48 overflow-y-auto p-4 bg-red-50 rounded-xl border border-red-100">
                        <!-- Incorrect items -->
                    </div>
                </div>

                <div class="flex flex-col gap-3">
                    <button id="retry-incorrect-btn" class="w-full py-4 bg-orange-500 text-white rounded-2xl font-bold hover:bg-orange-600 transition-colors hidden">
                        틀린 단어만 재시험 치기
                    </button>
                    <button onclick="location.reload()" class="w-full py-4 bg-slate-200 text-slate-700 rounded-2xl font-bold hover:bg-slate-300 transition-colors">
                        처음으로 돌아가기
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification Overlay -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full bg-slate-800 text-white text-sm font-medium opacity-0 transition-opacity pointer-events-none z-50">
        Message
    </div>

    <script>
        // PDF.js worker source
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const apiKey = ""; // Runtime provides this
        let allWords = [];
        let sessionWords = [];
        let currentIndex = 0;
        let score = 0;
        let mode = 'en-kr';
        let incorrectWords = [];
        let isReviewMode = false;

        // --- Core Functions ---

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.opacity = '1';
            setTimeout(() => { toast.style.opacity = '0'; }, 3000);
        }

        const dropZone = document.getElementById('drop-zone');
        const pdfInput = document.getElementById('pdf-input');

        dropZone.onclick = () => pdfInput.click();
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('border-indigo-400', 'bg-indigo-50'); };
        dropZone.ondragleave = () => { dropZone.classList.remove('border-indigo-400', 'bg-indigo-50'); };
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('border-indigo-400', 'bg-indigo-50');
            const file = e.dataTransfer.files[0];
            if (file && file.type === 'application/pdf') handleFileUpload(file);
        };

        pdfInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) handleFileUpload(file);
        };

        async function handleFileUpload(file) {
            document.getElementById('upload-section').classList.add('hidden');
            document.getElementById('loading-spinner').classList.remove('hidden');

            try {
                const reader = new FileReader();
                reader.onload = async function() {
                    const typedarray = new Uint8Array(this.result);
                    const pdf = await pdfjsLib.getDocument(typedarray).promise;
                    let fullText = "";
                    
                    for(let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const content = await page.getTextContent();
                        fullText += content.items.map(item => item.str).join(" ") + "\n";
                    }

                    await extractWordsWithAI(fullText);
                };
                reader.readAsArrayBuffer(file);
            } catch (err) {
                showToast("PDF를 읽는 중 오류가 발생했습니다.");
                document.getElementById('upload-section').classList.remove('hidden');
                document.getElementById('loading-spinner').classList.add('hidden');
            }
        }

        async function extractWordsWithAI(text) {
            const systemPrompt = "You are a vocabulary extractor. From the provided text, extract English words and their Korean meanings. Output ONLY a valid JSON array of objects: [{\"word\": \"...\", \"meaning\": \"...\"}]. Only include clear vocabulary pairs.";
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Extract vocabulary from this text:\n${text}` }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] },
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                const result = await response.json();
                const jsonText = result.candidates?.[0]?.content?.parts?.[0]?.text;
                allWords = JSON.parse(jsonText);
                
                renderWordSelection();
            } catch (err) {
                console.error(err);
                showToast("AI 분석 중 오류가 발생했습니다. 다시 시도해 주세요.");
                document.getElementById('upload-section').classList.remove('hidden');
                document.getElementById('loading-spinner').classList.add('hidden');
            }
        }

        function renderWordSelection() {
            document.getElementById('loading-spinner').classList.add('hidden');
            document.getElementById('selection-section').classList.remove('hidden');
            
            const list = document.getElementById('word-list');
            list.innerHTML = '';
            
            allWords.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = "flex items-center gap-3 p-3 border rounded-lg hover:bg-slate-50 transition-colors";
                div.innerHTML = `
                    <input type="checkbox" id="word-${index}" checked class="w-5 h-5 accent-indigo-600 cursor-pointer" onchange="updateSelectedCount()">
                    <label for="word-${index}" class="flex-1 cursor-pointer">
                        <span class="font-bold text-indigo-700">${item.word}</span>
                        <span class="mx-2 text-slate-300">|</span>
                        <span class="text-slate-600">${item.meaning}</span>
                    </label>
                `;
                list.appendChild(div);
            });
            updateSelectedCount();
        }

        function updateSelectedCount() {
            const count = document.querySelectorAll('#word-list input:checked').length;
            document.getElementById('selected-count').textContent = count;
        }

        function selectAll(bool) {
            document.querySelectorAll('#word-list input').forEach(input => input.checked = bool);
            updateSelectedCount();
        }

        function startSession(selectedMode) {
            const selectedIndices = Array.from(document.querySelectorAll('#word-list input:checked')).map(input => parseInt(input.id.split('-')[1]));
            
            if (selectedIndices.length === 0) {
                showToast("최소 한 개 이상의 단어를 선택해야 합니다.");
                return;
            }

            mode = selectedMode;
            sessionWords = selectedIndices.map(i => allWords[i]).sort(() => Math.random() - 0.5);
            
            currentIndex = 0;
            score = 0;
            incorrectWords = [];
            isReviewMode = false;

            document.getElementById('selection-section').classList.add('hidden');
            document.getElementById('quiz-section').classList.remove('hidden');
            
            renderQuiz();
        }

        function renderQuiz() {
            if (currentIndex >= sessionWords.length) {
                showResults();
                return;
            }

            const current = sessionWords[currentIndex];
            const targetEl = document.getElementById('target-word');
            const hintEl = document.getElementById('target-hint');
            const input = document.getElementById('answer-input');
            const feedback = document.getElementById('feedback');

            input.value = '';
            feedback.textContent = '';
            input.focus();

            if (mode === 'en-kr') {
                targetEl.textContent = current.word;
                hintEl.textContent = "뜻을 한글로 입력하세요";
            } else {
                targetEl.textContent = current.meaning;
                hintEl.textContent = "영단어를 입력하세요";
            }

            updateProgress();
        }

        function updateProgress() {
            const total = sessionWords.length;
            const current = currentIndex + 1;
            document.getElementById('quiz-progress').textContent = `Problem ${current} of ${total}`;
            document.getElementById('quiz-score').textContent = `Score: ${score}`;
            document.getElementById('progress-bar').style.width = `${(currentIndex / total) * 100}%`;
        }

        function checkAnswer() {
            const input = document.getElementById('answer-input');
            const feedback = document.getElementById('feedback');
            const userAnswer = input.value.trim().toLowerCase();
            const current = sessionWords[currentIndex];
            
            let isCorrect = false;
            let correctAnswer = "";

            if (mode === 'en-kr') {
                // 한글 뜻 체크 (단순 문자열 포함 여부 등으로 유연하게 처리할 수도 있음)
                correctAnswer = current.meaning.toLowerCase();
                isCorrect = correctAnswer.includes(userAnswer) && userAnswer.length > 0;
            } else {
                correctAnswer = current.word.toLowerCase();
                isCorrect = userAnswer === correctAnswer;
            }

            if (isCorrect) {
                score++;
                feedback.textContent = "정답입니다! ✨";
                feedback.className = "mt-6 text-center h-8 font-bold text-green-500";
            } else {
                incorrectWords.push(current);
                feedback.textContent = `틀렸습니다. 정답: ${correctAnswer}`;
                feedback.className = "mt-6 text-center h-8 font-bold text-red-500";
            }

            document.getElementById('submit-btn').disabled = true;
            
            setTimeout(() => {
                currentIndex++;
                document.getElementById('submit-btn').disabled = false;
                renderQuiz();
            }, 1500);
        }

        function showResults() {
            document.getElementById('quiz-section').classList.add('hidden');
            document.getElementById('result-section').classList.remove('hidden');
            
            const stats = document.getElementById('final-stats');
            stats.textContent = `${sessionWords.length}문제 중 ${score}문제를 맞혔습니다.`;
            
            const incorrectContainer = document.getElementById('incorrect-list-container');
            const incorrectList = document.getElementById('incorrect-list');
            const retryBtn = document.getElementById('retry-incorrect-btn');

            if (incorrectWords.length > 0) {
                incorrectContainer.classList.remove('hidden');
                retryBtn.classList.remove('hidden');
                incorrectList.innerHTML = '';
                incorrectWords.forEach(item => {
                    const div = document.createElement('div');
                    div.className = "p-2 bg-white rounded border flex justify-between";
                    div.innerHTML = `<span class="font-bold">${item.word}</span> <span class="text-slate-500">${item.meaning}</span>`;
                    incorrectList.appendChild(div);
                });

                retryBtn.onclick = () => {
                    sessionWords = [...incorrectWords].sort(() => Math.random() - 0.5);
                    currentIndex = 0;
                    score = 0;
                    incorrectWords = [];
                    isReviewMode = true;
                    document.getElementById('result-section').classList.add('hidden');
                    document.getElementById('quiz-section').classList.remove('hidden');
                    renderQuiz();
                };
            } else {
                incorrectContainer.classList.add('hidden');
                retryBtn.classList.add('hidden');
            }
            
            lucide.createIcons();
        }

        // --- Event Listeners ---

        document.getElementById('submit-btn').onclick = checkAnswer;
        document.getElementById('answer-input').onkeydown = (e) => {
            if (e.key === 'Enter' && !document.getElementById('submit-btn').disabled) {
                checkAnswer();
            }
        };

        // Initialize Lucide
        lucide.createIcons();

    </script>
</body>
</html>
